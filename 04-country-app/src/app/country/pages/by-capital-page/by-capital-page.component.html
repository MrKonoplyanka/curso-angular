<country-search-input
  placeholder="Buscar Por Capital"
  (value)="query.set($event)"
  [debounceTime]="300"
  [initialValue]="query()"
  />
<country-list [countries]="countryResource.value() ?? []" [isEmpty]="countryResource.hasValue() && countryResource.value()?.length === 0" [isLoading]="countryResource.isLoading()" [errorMessage]=" countryResource.error()"></country-list>
